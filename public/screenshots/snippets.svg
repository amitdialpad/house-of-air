      <text x="20" y="156" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Synthesis doc → leadership review</text>
      <text x="20" y="200" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">"Every admin we talked to does the</text>
      <text x="20" y="218" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">same CSV export workaround. We can</text>
      <text x="20" y="236" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">kill that whole pattern with one feature."</text>
      <text x="20" y="262" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#525252" letter-spacing="2">3 WINS · 0 BLOCKS</text>
    </g>
