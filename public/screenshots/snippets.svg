      <text x="60" y="58" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">PRD Engineering · Bangalore</text>
      <line x1="20" y1="84" x2="420" y2="84" stroke="#262626"/>
      <text x="20" y="112" font-family="-apple-system" font-size="13" fill="#a8a8a8">› GCP reseller migration spec done</text>
      <text x="20" y="134" font-family="-apple-system" font-size="13" fill="#a8a8a8">› License tier model PR landed</text>
      <text x="20" y="156" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Audit ticket DP-185139 reviewed</text>
      <text x="20" y="200" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">"Bundles V1 and V2 are running in</text>
      <text x="20" y="218" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">parallel for two more sprints. UI needs</text>
      <text x="20" y="236" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">to handle both without flickering."</text>
      <text x="20" y="262" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#525252" letter-spacing="2">3 WINS · 1 BLOCK</text>
