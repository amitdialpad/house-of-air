      <text x="20" y="218" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">banner under a tab. Moved it to the</text>
      <text x="20" y="236" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">main scroll. Suddenly it makes sense."</text>
      <text x="20" y="262" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#525252" letter-spacing="2">3 WINS · 0 BLOCKS</text>
    </g>

