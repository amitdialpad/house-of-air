      <text x="60" y="58" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">Product Design · San Francisco</text>
      <line x1="20" y1="84" x2="420" y2="84" stroke="#262626"/>
      <text x="20" y="112" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Wallet hierarchy review with PM</text>
