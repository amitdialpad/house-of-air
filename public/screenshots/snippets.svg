  <rect width="1600" height="1000" fill="url(#snbg)"/>

  <text x="80" y="120" font-family="Iowan Old Style, Georgia, serif" font-size="48" fill="#e6edf3" font-weight="500">what the team is thinking</text>
  <text x="80" y="156" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#7d8590" letter-spacing="3">HOUSE OF AYRE / 02 · WEEK OF MAY 4</text>

  <g transform="translate(80, 220)">
    <g>
      <rect width="440" height="280" rx="12" fill="#141414" stroke="#262626"/>
