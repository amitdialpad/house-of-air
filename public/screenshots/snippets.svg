      <text x="20" y="218" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">the drawer needs to handle empty state</text>
      <text x="20" y="236" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">and long notes better. Sent fixes."</text>
      <text x="20" y="262" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#525252" letter-spacing="2">3 WINS · 0 BLOCKS</text>
    </g>

    <g transform="translate(456, 0)">
