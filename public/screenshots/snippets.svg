      <text x="60" y="40" font-family="-apple-system" font-size="15" fill="#e6edf3" font-weight="600">Amit Ayre</text>
      <text x="60" y="58" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">Design Systems · Bangalore</text>
      <line x1="20" y1="84" x2="420" y2="84" stroke="#262626"/>
      <text x="20" y="112" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Shipped credits and usage prototype</text>
      <text x="20" y="134" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Started license page revamp</text>
      <text x="20" y="156" font-family="-apple-system" font-size="13" fill="#a8a8a8">› What's New drawer round 2 sent</text>
      <text x="20" y="200" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">"Tier-first model finally clicked when</text>
      <text x="20" y="218" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">I stopped fighting the existing config</text>
      <text x="20" y="236" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7d8590">and layered Randstad scale on top..."</text>
      <text x="20" y="262" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#525252" letter-spacing="2">3 WINS · 1 BLOCK</text>
    </g>

