<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bnbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1410"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="drawerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bnbg)"/>

  <text x="80" y="120" font-family="Iowan Old Style, Georgia, serif" font-size="48" fill="#e6edf3" font-weight="500">what's new in beacon</text>
  <text x="80" y="156" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#7d8590" letter-spacing="3">HOUSE OF AYRE / 03 · AUTO-SYNCING RELEASES FOR DESIGNERS</text>

  <g transform="translate(80, 220)" opacity="0.4">
    <rect width="780" height="680" rx="12" fill="#141414" stroke="#262626"/>
    <rect width="220" height="680" rx="12" fill="#0d0d0d"/>
    <rect x="208" width="12" height="680" fill="#0d0d0d"/>

    <text x="36" y="56" font-family="Iowan Old Style, Georgia, serif" font-size="22" fill="#e6edf3" font-weight="500">Beacon</text>
    <text x="36" y="76" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590" letter-spacing="2">v4.2.1</text>

    <text x="36" y="138" font-family="-apple-system" font-size="13" fill="#7d8590">Inbox</text>
    <text x="36" y="170" font-family="-apple-system" font-size="13" fill="#7d8590">Components</text>
    <text x="36" y="202" font-family="-apple-system" font-size="13" fill="#7d8590">Patterns</text>
    <text x="36" y="234" font-family="-apple-system" font-size="13" fill="#7d8590">Foundations</text>
    <text x="36" y="266" font-family="-apple-system" font-size="13" fill="#7d8590">Icons</text>
    <text x="36" y="298" font-family="-apple-system" font-size="13" fill="#e6edf3">What's New</text>

    <g transform="translate(260, 0)">
      <text x="0" y="80" font-family="Iowan Old Style, Georgia, serif" font-size="34" fill="#e6edf3">Inbox</text>
      <text x="0" y="114" font-family="-apple-system" font-size="14" fill="#7d8590">Recent updates from the Dialtone team</text>

      <rect y="160" width="480" height="76" rx="10" fill="#0d0d0d" stroke="#262626"/>
      <rect y="252" width="480" height="76" rx="10" fill="#0d0d0d" stroke="#262626"/>
      <rect y="344" width="480" height="76" rx="10" fill="#0d0d0d" stroke="#262626"/>
      <rect y="436" width="480" height="76" rx="10" fill="#0d0d0d" stroke="#262626"/>
    </g>
  </g>

  <g transform="translate(880, 220)">
    <rect x="-12" width="640" height="680" rx="14" fill="#000" opacity="0.4"/>
    <rect width="620" height="680" rx="14" fill="#0f0f0f" stroke="#3a3a3a" stroke-width="1.5"/>

    <text x="40" y="62" font-family="Iowan Old Style, Georgia, serif" font-size="28" fill="#e6edf3" font-weight="500">What's New</text>
    <g transform="translate(200, 40)">
      <rect width="52" height="22" rx="11" fill="#0d2818" stroke="#2ea043"/>
      <text x="26" y="15" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#3fb950" letter-spacing="1.5" text-anchor="middle">NEW</text>
    </g>

    <text x="40" y="88" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590" letter-spacing="2">AUTO-SYNCED · 2 MINS AGO</text>

    <line x1="40" y1="118" x2="580" y2="118" stroke="#262626"/>

    <g transform="translate(40, 146)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#3fb950" letter-spacing="2">DIALTONE 4.2.1 · MAY 11</text>
      <text y="34" font-family="-apple-system" font-size="18" fill="#e6edf3" font-weight="600">DtDatepicker: weekStartsOn prop</text>
      <text y="66" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Configurable week start day</text>
      <text y="88" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Defaults to Sunday for back-compat</text>
      <text y="110" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Locale-aware fallback added</text>
    </g>

    <line x1="40" y1="288" x2="580" y2="288" stroke="#262626"/>

    <g transform="translate(40, 316)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590" letter-spacing="2">DIALTONE 4.2.0 · MAY 7</text>
      <text y="34" font-family="-apple-system" font-size="18" fill="#e6edf3" font-weight="600">New: DtSplitButton</text>
      <text y="66" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Primary action + dropdown menu</text>
      <text y="88" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Use for export, save, send</text>
      <text y="110" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Replaces 4 ad-hoc patterns</text>
    </g>

    <line x1="40" y1="458" x2="580" y2="458" stroke="#262626"/>

    <g transform="translate(40, 486)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590" letter-spacing="2">DIALTONE 4.1.9 · MAY 2</text>
      <text y="34" font-family="-apple-system" font-size="18" fill="#e6edf3" font-weight="600">DtChip: hide-close prop</text>
      <text y="66" font-family="-apple-system" font-size="13" fill="#a8a8a8">› For read-only chips like default emails</text>
      <text y="88" font-family="-apple-system" font-size="13" fill="#a8a8a8">› Already used in Export modal</text>
    </g>

    <text x="40" y="650" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#7d8590" letter-spacing="2">→ VIEW ALL 142 RELEASES</text>
  </g>

  <text x="1520" y="980" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#444" text-anchor="end">house of ayre</text>
</svg>
