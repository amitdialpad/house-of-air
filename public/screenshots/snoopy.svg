<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="snpbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#snpbg)"/>

  <text x="80" y="120" font-family="Iowan Old Style, Georgia, serif" font-size="48" fill="#e6edf3" font-weight="500">a research pipeline that writes prose</text>
  <text x="80" y="156" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#7d8590" letter-spacing="3">HOUSE OF AYRE / 06 · SNOOPY · AMPLITUDE → PYTHON → CLAUDE → INBOX</text>

  <g transform="translate(80, 220)">
    <rect width="1440" height="680" rx="14" fill="#141414" stroke="#262626"/>

    <g transform="translate(0, 0)">
      <rect width="1440" height="64" rx="14" fill="#0d0d0d"/>
      <rect y="50" width="1440" height="14" fill="#0d0d0d"/>
      <text x="32" y="40" font-family="Iowan Old Style, Georgia, serif" font-size="22" fill="#e6edf3" font-weight="500">Snoopy</text>
      <text x="32" y="40" dx="120" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#7d8590" letter-spacing="2">WEEKLY · WEEK OF MAY 4</text>
      <g transform="translate(1280, 22)">
        <rect width="120" height="22" rx="11" fill="#0d2818" stroke="#2ea043"/>
        <text x="60" y="15" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#3fb950" letter-spacing="1.5" text-anchor="middle">REPORT READY</text>
      </g>
    </g>

    <g transform="translate(60, 100)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#22d3ee" letter-spacing="3">PART 1 — WHAT WE KNOW</text>
      <text y="32" font-family="-apple-system" font-size="18" fill="#e6edf3" font-weight="600">License purchase funnel · last 7 days</text>

      <g transform="translate(0, 60)">
        <rect width="420" height="28" rx="4" fill="#1f6feb"/>
        <text x="14" y="20" font-family="-apple-system" font-size="13" fill="#e6edf3" font-weight="600">Started · 412</text>

        <rect y="38" width="293" height="28" rx="4" fill="#1f6feb" opacity="0.75"/>
        <text x="14" y="58" font-family="-apple-system" font-size="13" fill="#e6edf3" font-weight="600">Confirmed · 287</text>
        <text x="307" y="58" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">70%</text>

        <rect y="76" width="202" height="28" rx="4" fill="#22d3ee" opacity="0.85"/>
        <text x="14" y="96" font-family="-apple-system" font-size="13" fill="#0a0a0a" font-weight="600">Purchased · 198</text>
        <text x="216" y="96" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">69% of confirmers</text>

        <rect y="114" width="91" height="28" rx="4" fill="#ef4444" opacity="0.7"/>
        <text x="14" y="134" font-family="-apple-system" font-size="13" fill="#e6edf3" font-weight="600">Canceled · 89</text>
        <text x="105" y="134" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">31% of confirmers</text>
      </g>

      <g transform="translate(580, 32)">
        <text font-family="-apple-system" font-size="18" fill="#e6edf3" font-weight="600">Churn composition · 47 offices</text>
        <g transform="translate(0, 28)">
          <rect width="380" height="20" fill="#262626"/>
          <rect width="183" height="20" fill="#fbbf24"/>
          <rect x="183" width="114" height="20" fill="#f472b6"/>
          <rect x="297" width="83" height="20" fill="#94a3b8"/>
        </g>
        <text y="68" font-family="-apple-system" font-size="13" fill="#fbbf24" font-weight="600">● Est. fraud · 23</text>
        <text x="120" y="68" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">~48%</text>
        <text y="90" font-family="-apple-system" font-size="13" fill="#f472b6" font-weight="600">● Voluntary · 14</text>
        <text x="120" y="90" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">~30%</text>
        <text y="112" font-family="-apple-system" font-size="13" fill="#94a3b8" font-weight="600">● Involuntary · 10</text>
        <text x="120" y="112" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7d8590">~22%</text>
      </g>

      <g transform="translate(1060, 32)">
        <text font-family="-apple-system" font-size="18" fill="#e6edf3" font-weight="600">Backend pulse</text>
        <text y="32" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#a8a8a8">paid <tspan fill="#e6edf3" font-weight="600">234</tspan></text>
        <text y="56" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#a8a8a8">renewal <tspan fill="#e6edf3" font-weight="600">612</tspan></text>
        <text y="80" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#a8a8a8">hold → unhold <tspan fill="#e6edf3" font-weight="600">18 → 11</tspan></text>
        <text y="104" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#a8a8a8">support contacts <tspan fill="#e6edf3" font-weight="600">37</tspan></text>
      </g>
    </g>

    <line x1="60" y1="350" x2="1380" y2="350" stroke="#1f1f1f"/>

    <g transform="translate(60, 380)">
      <g>
        <text font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#22d3ee" letter-spacing="3">PART 2 — UX INSIGHTS</text>
        <text y="28" font-family="-apple-system" font-size="14" fill="#e6edf3">› Admins who hit "back from confirm" are 3× less likely to return</text>
        <text y="52" font-family="-apple-system" font-size="14" fill="#e6edf3">› Add-credits CTA gets clicked but rarely completes</text>
        <text y="76" font-family="-apple-system" font-size="14" fill="#e6edf3">› 23% of cancel-clicks claim the save promo (down from 31% in Mar)</text>
      </g>

      <g transform="translate(680, 0)">
        <text font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#22d3ee" letter-spacing="3">PART 3 — PROTOTYPE VALIDATION</text>
        <text y="28" font-family="-apple-system" font-size="14" fill="#e6edf3">› Wallet card order mirrors the actual pool draw-down ✓</text>
        <text y="52" font-family="-apple-system" font-size="14" fill="#e6edf3">› Settings → AddCredits handles the 31% confirm-cancel case ✓</text>
        <text y="76" font-family="-apple-system" font-size="14" fill="#e6edf3">› Rate column still missing per-service comparison data</text>
      </g>
    </g>

    <g transform="translate(60, 540)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#22d3ee" letter-spacing="3">PART 4 — WHAT WE NEED</text>
      <text y="28" font-family="-apple-system" font-size="14" fill="#fbbf24">› Cancellation reason not tracked · need event on reason-pick</text>
      <text y="52" font-family="-apple-system" font-size="14" fill="#fbbf24">› Auto-recharge frequency invisible · awaiting firespotter PR #74654</text>
      <text y="76" font-family="-apple-system" font-size="14" fill="#fbbf24">› No funnel from CSV export → recurring report setup</text>
    </g>
  </g>

  <text x="80" y="980" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#525252">amplitude → python → claude · weekly · saved to ~/snoopy/reports/</text>
  <text x="1520" y="980" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#444" text-anchor="end">house of ayre</text>
</svg>
